baseURL = "https://yunchen011.github.io/"
locale = "en-us"
title = "Yun Chen"

paginate = 10
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[module]
  [[module.imports]]
    path = "github.com/adityatelange/hugo-PaperMod"

[minify]
  [minify.tdewolff]
    [minify.tdewolff.html]
      keepWhitespace = false

[params]
  env = "production"
  title = "Yun Chen"
  description = "Yun Chen — PhD student, ECE, North Carolina State University"
  keywords = ["Yun Chen", "wireless communications", "deep learning"]
  author = "Yun Chen"
  defaultTheme = "auto"
  disableThemeToggle = false
  ShowShareButtons = false
  ShowReadingTime = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = false
  ShowWordCount = false
  ShowRssButtonInSectionTermList = false
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  hidemeta = false
  hideSummary = false
  showtoc = false
  tocopen = false

  # Profile-mode replaces the old hero/about widgets on the homepage.
  [params.profileMode]
    enabled = true
    title = "Yun Chen"
    subtitle = "PhD student in Electrical & Computer Engineering, NC State University — sensor fusion and machine learning for wireless communications."
    imageUrl = "img/Yun_photo.png"
    imageTitle = "Yun Chen"
    buttons = [
      { name = "About", url = "about/" },
      { name = "Experience", url = "experience/" },
      { name = "Projects", url = "projects/" },
      { name = "Publications", url = "publications/" },
      { name = "CV", url = "files/CV_yunchen.pdf" },
    ]

  [params.assets]
    disableFingerprinting = false

  [[params.socialIcons]]
    name = "email"
    url = "mailto:rachelchen0216@gmail.com"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://www.linkedin.com/in/yun-chen-site/"

[[menu.main]]
  identifier = "about"
  name = "About"
  url = "/about/"
  weight = 10

[[menu.main]]
  identifier = "experience"
  name = "Experience"
  url = "/experience/"
  weight = 20

[[menu.main]]
  identifier = "projects"
  name = "Projects"
  url = "/projects/"
  weight = 30

[[menu.main]]
  identifier = "publications"
  name = "Publications"
  url = "/publications/"
  weight = 40

[[menu.main]]
  identifier = "cv"
  name = "CV"
  url = "/files/CV_yunchen.pdf"
  weight = 50

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
